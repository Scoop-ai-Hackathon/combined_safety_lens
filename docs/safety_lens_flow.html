<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Lens - Application Flow Diagram</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #00ff88;
            text-align: center;
            margin-bottom: 30px;
        }
        .diagram {
            background: #0d1117;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        svg {
            width: 100%;
            height: auto;
        }
        .node {
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3));
        }
        .start-end { fill: #28a745; }
        .process { fill: #0d6efd; }
        .decision { fill: #fd7e14; }
        .danger { fill: #dc3545; }
        .io { fill: #6f42c1; }
        .subprocess { fill: #20c997; }
        text {
            font-family: 'Segoe UI', sans-serif;
            font-size: 11px;
            fill: white;
        }
        .arrow {
            stroke: #6c757d;
            stroke-width: 2;
            fill: none;
            marker-end: url(#arrowhead);
        }
        .arrow-yes {
            stroke: #28a745;
            stroke-width: 2;
            fill: none;
            marker-end: url(#arrowhead-green);
        }
        .arrow-no {
            stroke: #dc3545;
            stroke-width: 2;
            fill: none;
            marker-end: url(#arrowhead-red);
        }
        .label {
            font-size: 10px;
            fill: #adb5bd;
        }
        .section-label {
            font-size: 13px;
            fill: #00ff88;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Safety Lens: Active Sentinel - Application Flow</h1>
        <div class="diagram">
            <svg viewBox="0 0 1100 950" xmlns="http://www.w3.org/2000/svg">
                <!-- Defs for arrows -->
                <defs>
                    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="#6c757d"/>
                    </marker>
                    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="#28a745"/>
                    </marker>
                    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="#dc3545"/>
                    </marker>
                </defs>

                <!-- Section Labels -->
                <text x="50" y="30" class="section-label">INITIALIZATION</text>
                <text x="50" y="230" class="section-label">MAIN MONITORING LOOP</text>
                <text x="700" y="230" class="section-label">HAZARD DETECTION</text>
                <text x="700" y="600" class="section-label">EMERGENCY RESPONSE</text>

                <!-- START -->
                <g class="node" transform="translate(150, 50)">
                    <ellipse cx="60" cy="25" rx="60" ry="25" class="start-end"/>
                    <text x="60" y="30" text-anchor="middle">START</text>
                </g>

                <!-- User clicks START -->
                <g class="node" transform="translate(120, 120)">
                    <polygon points="60,0 120,25 60,50 0,25" class="io"/>
                    <text x="60" y="30" text-anchor="middle">User clicks</text>
                    <text x="60" y="42" text-anchor="middle">START SYSTEM</text>
                </g>

                <!-- Initialize Camera -->
                <g class="node" transform="translate(300, 120)">
                    <rect x="0" y="0" width="140" height="50" rx="5" class="process"/>
                    <text x="70" y="22" text-anchor="middle">Initialize Camera</text>
                    <text x="70" y="36" text-anchor="middle">(cv2.VideoCapture)</text>
                </g>

                <!-- Load MediaPipe -->
                <g class="node" transform="translate(480, 120)">
                    <rect x="0" y="0" width="140" height="50" rx="5" class="process"/>
                    <text x="70" y="22" text-anchor="middle">Load MediaPipe</text>
                    <text x="70" y="36" text-anchor="middle">Hand Landmarker</text>
                </g>

                <!-- Arrows for init -->
                <path class="arrow" d="M210,100 L210,120"/>
                <path class="arrow" d="M240,145 L300,145"/>
                <path class="arrow" d="M440,145 L480,145"/>

                <!-- Monitor Active Check -->
                <g class="node" transform="translate(150, 260)">
                    <polygon points="70,0 140,40 70,80 0,40" class="decision"/>
                    <text x="70" y="36" text-anchor="middle">monitor</text>
                    <text x="70" y="50" text-anchor="middle">_active?</text>
                </g>

                <!-- Arrow from init to loop -->
                <path class="arrow" d="M550,170 L550,200 L220,200 L220,260"/>

                <!-- Capture Frame -->
                <g class="node" transform="translate(120, 380)">
                    <rect x="0" y="0" width="130" height="45" rx="5" class="process"/>
                    <text x="65" y="20" text-anchor="middle">Capture Frame</text>
                    <text x="65" y="34" text-anchor="middle">cap.read()</text>
                </g>

                <!-- Optical Flow -->
                <g class="node" transform="translate(120, 460)">
                    <rect x="0" y="0" width="130" height="45" rx="5" class="process"/>
                    <text x="65" y="20" text-anchor="middle">Calculate</text>
                    <text x="65" y="34" text-anchor="middle">Optical Flow</text>
                </g>

                <!-- Hand Detection -->
                <g class="node" transform="translate(120, 540)">
                    <rect x="0" y="0" width="130" height="45" rx="5" class="subprocess"/>
                    <text x="65" y="20" text-anchor="middle">Hand Detection</text>
                    <text x="65" y="34" text-anchor="middle">(MediaPipe)</text>
                </g>

                <!-- Hand Detected? -->
                <g class="node" transform="translate(300, 520)">
                    <polygon points="70,0 140,40 70,80 0,40" class="decision"/>
                    <text x="70" y="36" text-anchor="middle">Hand</text>
                    <text x="70" y="50" text-anchor="middle">Detected?</text>
                </g>

                <!-- Arrows in main flow -->
                <path class="arrow-yes" d="M220,340 L220,380"/>
                <text x="230" y="365" class="label">Yes</text>
                <path class="arrow" d="M185,425 L185,460"/>
                <path class="arrow" d="M185,505 L185,540"/>
                <path class="arrow" d="M250,562 L300,562"/>

                <!-- No hand - display frame -->
                <g class="node" transform="translate(300, 640)">
                    <rect x="0" y="0" width="130" height="45" rx="5" class="io"/>
                    <text x="65" y="20" text-anchor="middle">Display Frame</text>
                    <text x="65" y="34" text-anchor="middle">"ZONE CLEAR"</text>
                </g>

                <!-- Arrow for no hand -->
                <path class="arrow-no" d="M370,600 L370,640"/>
                <text x="380" y="625" class="label">No</text>

                <!-- Loop back arrow -->
                <path class="arrow" d="M365,685 L365,720 L50,720 L50,300 L150,300"/>

                <!-- HAZARD DETECTION SECTION -->

                <!-- Draw Bounding Box -->
                <g class="node" transform="translate(500, 380)">
                    <rect x="0" y="0" width="130" height="45" rx="5" class="process"/>
                    <text x="65" y="20" text-anchor="middle">Draw Hand</text>
                    <text x="65" y="34" text-anchor="middle">Bounding Box</text>
                </g>

                <!-- Compression Detection -->
                <g class="node" transform="translate(500, 460)">
                    <rect x="0" y="0" width="130" height="45" rx="5" class="subprocess"/>
                    <text x="65" y="20" text-anchor="middle">Compression</text>
                    <text x="65" y="34" text-anchor="middle">Detection (Area)</text>
                </g>

                <!-- ROI Analysis -->
                <g class="node" transform="translate(680, 380)">
                    <rect x="0" y="0" width="150" height="45" rx="5" class="subprocess"/>
                    <text x="75" y="20" text-anchor="middle">Optical Flow ROI</text>
                    <text x="75" y="34" text-anchor="middle">Analysis (L/R/T/B)</text>
                </g>

                <!-- Hand Movement Suppression -->
                <g class="node" transform="translate(680, 460)">
                    <rect x="0" y="0" width="150" height="45" rx="5" class="process"/>
                    <text x="75" y="20" text-anchor="middle">Hand Movement</text>
                    <text x="75" y="34" text-anchor="middle">Suppression</text>
                </g>

                <!-- Leaky Bucket -->
                <g class="node" transform="translate(880, 380)">
                    <rect x="0" y="0" width="140" height="45" rx="5" class="subprocess"/>
                    <text x="70" y="20" text-anchor="middle">Leaky Bucket</text>
                    <text x="70" y="34" text-anchor="middle">Accumulator</text>
                </g>

                <!-- Hazard Threshold Check -->
                <g class="node" transform="translate(880, 480)">
                    <polygon points="70,0 140,40 70,80 0,40" class="decision"/>
                    <text x="70" y="32" text-anchor="middle">Hazard</text>
                    <text x="70" y="46" text-anchor="middle">Level</text>
                    <text x="70" y="60" text-anchor="middle">>= 10?</text>
                </g>

                <!-- Arrows in hazard section -->
                <path class="arrow-yes" d="M440,560 L500,560 L500,520 L565,425"/>
                <text x="450" y="550" class="label">Yes</text>
                <path class="arrow" d="M630,402 L680,402"/>
                <path class="arrow" d="M565,425 L565,460"/>
                <path class="arrow" d="M755,425 L755,460"/>
                <path class="arrow" d="M830,402 L880,402"/>
                <path class="arrow" d="M950,425 L950,480"/>
                <path class="arrow" d="M630,482 L680,482"/>

                <!-- No hazard - continue monitoring -->
                <path class="arrow-no" d="M880,520 L820,520 L820,600 L430,600 L430,662 L430,720 L50,720"/>
                <text x="830" y="535" class="label">No</text>

                <!-- EMERGENCY RESPONSE SECTION -->

                <!-- Pinch Detected -->
                <g class="node" transform="translate(880, 620)">
                    <rect x="0" y="0" width="140" height="50" rx="5" class="danger"/>
                    <text x="70" y="22" text-anchor="middle">CRUSH HAZARD</text>
                    <text x="70" y="38" text-anchor="middle">DETECTED!</text>
                </g>

                <!-- Save Screenshot -->
                <g class="node" transform="translate(700, 700)">
                    <rect x="0" y="0" width="130" height="45" rx="5" class="io"/>
                    <text x="65" y="20" text-anchor="middle">Save Screenshot</text>
                    <text x="65" y="34" text-anchor="middle">to /screenshots</text>
                </g>

                <!-- Trigger Spoon Agent -->
                <g class="node" transform="translate(860, 700)">
                    <rect x="0" y="0" width="140" height="45" rx="5" class="subprocess"/>
                    <text x="70" y="20" text-anchor="middle">Trigger Spoon</text>
                    <text x="70" y="34" text-anchor="middle">Agent Incident</text>
                </g>

                <!-- Set Latched -->
                <g class="node" transform="translate(780, 780)">
                    <rect x="0" y="0" width="140" height="45" rx="5" class="danger"/>
                    <text x="70" y="20" text-anchor="middle">Set hazard_latched</text>
                    <text x="70" y="34" text-anchor="middle">= True</text>
                </g>

                <!-- Play Alarm -->
                <g class="node" transform="translate(780, 860)">
                    <rect x="0" y="0" width="140" height="45" rx="5" class="io"/>
                    <text x="70" y="20" text-anchor="middle">Play Audio Alarm</text>
                    <text x="70" y="34" text-anchor="middle">+ Red Frame</text>
                </g>

                <!-- SYSTEM HALTED -->
                <g class="node" transform="translate(600, 860)">
                    <rect x="0" y="0" width="140" height="45" rx="5" class="danger"/>
                    <text x="70" y="28" text-anchor="middle">SYSTEM HALTED</text>
                </g>

                <!-- Reset Button -->
                <g class="node" transform="translate(420, 860)">
                    <polygon points="70,0 140,25 70,50 0,25" class="io"/>
                    <text x="70" y="30" text-anchor="middle">User RESET</text>
                </g>

                <!-- Arrows in emergency section -->
                <path class="arrow-yes" d="M950,560 L950,620"/>
                <text x="960" y="595" class="label">Yes</text>
                <path class="arrow" d="M950,670 L950,700"/>
                <path class="arrow" d="M860,722 L830,722"/>
                <path class="arrow" d="M850,745 L850,780"/>
                <path class="arrow" d="M850,825 L850,860"/>
                <path class="arrow" d="M780,882 L740,882"/>
                <path class="arrow" d="M600,882 L560,882"/>

                <!-- Loop back from reset -->
                <path class="arrow" d="M420,882 L350,882 L350,800 L50,800 L50,300 L150,300"/>

                <!-- Exit path -->
                <g class="node" transform="translate(50, 320)">
                    <ellipse cx="50" cy="20" rx="50" ry="20" class="start-end"/>
                    <text x="50" y="25" text-anchor="middle">EXIT</text>
                </g>
                <path class="arrow-no" d="M150,300 L100,320"/>
                <text x="110" y="305" class="label">No</text>

                <!-- Legend -->
                <g transform="translate(50, 850)">
                    <text x="0" y="0" class="section-label">LEGEND:</text>
                    <rect x="0" y="10" width="20" height="15" rx="3" class="start-end"/>
                    <text x="25" y="22" class="label">Start/End</text>
                    <rect x="90" y="10" width="20" height="15" rx="3" class="process"/>
                    <text x="115" y="22" class="label">Process</text>
                    <rect x="170" y="10" width="20" height="15" rx="3" class="subprocess"/>
                    <text x="195" y="22" class="label">Detection</text>
                    <polygon points="270,10 285,17 270,25 255,17" class="decision"/>
                    <text x="290" y="22" class="label">Decision</text>
                    <rect x="350" y="10" width="20" height="15" rx="3" class="io"/>
                    <text x="375" y="22" class="label">I/O</text>
                </g>

            </svg>
        </div>
    </div>
</body>
</html>
